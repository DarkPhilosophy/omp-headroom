name: CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

permissions:
    contents: read
    actions: read
    security-events: write

jobs:
    extension:
        name: Extension (typecheck + tests + leak scan)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install locked development dependencies
              run: bun install --frozen-lockfile

            - name: Typecheck
              run: bun run typecheck

            - name: Behavioral tests
              run: bun test tests/

            - name: Leak scan
              run: bun .scripts/scan-leaks.mjs

    lint:
        name: Biome
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install locked development dependencies
              run: bun install --frozen-lockfile

            - name: Biome check
              run: bun run check

    package:
        name: Package (tarball smoke)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install locked development dependencies
              run: bun install --frozen-lockfile

            - name: Check package contents
              run: |
                  npm pack --dry-run --json > "$RUNNER_TEMP/pack.json"
                  node - "$RUNNER_TEMP/pack.json" <<'NODE'
                  const [{ files = [] }] = require(process.argv[2]);
                  const paths = new Set(files.map(({ path }) => path));
                  const expected = [
                    "README.md",
                    ".github/CHANGELOG.md",
                    "LICENSE",
                    "src/index.ts",
                    "systemd/headroom-proxy.service.in",
                  ];
                  const forbidden = ["extension/headroom.ts", "install.sh", "tests/commands.test.mjs"];
                  for (const path of expected) {
                    if (!paths.has(path)) throw new Error(`missing package asset: ${path}`);
                  }
                  for (const path of forbidden) {
                    if (paths.has(path)) throw new Error(`unexpected package asset: ${path}`);
                  }
                  NODE

            - name: Install packed plugin as an OMP plugin
              run: |
                  TARBALL="$(npm pack --json | node -e 'let text=""; process.stdin.on("data", chunk => text += chunk).on("end", () => process.stdout.write(JSON.parse(text)[0].filename))')"
                  mkdir -p "$RUNNER_TEMP/package"
                  tar -xzf "$GITHUB_WORKSPACE/$TARBALL" -C "$RUNNER_TEMP/package"
                  export HOME="$RUNNER_TEMP/omp-home"
                  export PATH="$GITHUB_WORKSPACE/node_modules/.bin:$PATH"
                  omp plugin install "$RUNNER_TEMP/package/package"
                  omp plugin doctor

    security:
        name: Dependency vulnerabilities
        uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
            scan-args: --lockfile=bun.lock
            upload-sarif: false
            fail-on-vuln: true
